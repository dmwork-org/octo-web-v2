# octo-web · GitLab CI
#
# install&build (pnpm build -> dist/) -> package (docker build + push) -> deploy (k apply + set image)
# 纯静态 nginx 镜像,没有 PVC / MR 预览子目录。
#
# 复用 miaozhen-frontend 现成的 CI 变量:
#   HARBOR_PWD               Harbor 推送密码
#   CI_K8S_MZ_FRONTEND_TOKEN mz-frontend 空间 K8s token

stages:
  - quality
  - install&build
  - package
  - deploy

workflow:
  rules:
    # main 分支 push 触发,但部署的 k8s 资源仍沿用 test 命名(ingress 已映射到 octo-web-test-svc)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    # 手动/定时任务必须显式指定 PIPELINE_TASK,避免未来新增任务时互相串线。
    - if: '$CI_PIPELINE_SOURCE == "web" && $PIPELINE_TASK == "dupcheck"'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $PIPELINE_TASK == "dupcheck"'
    - when: never

variables:
  APP_NAME: octo-web
  REPOSITORY: hub.intra.mlamp.cn
  CONTAINER_IMAGE: hub.intra.mlamp.cn/miaozhen-frontend/octo-web
  K8S_SPACE_NAME: mz-frontend
  K8S_SERVER: https://k8s.nb.intra.mlamp.cn:8443
  FF_USE_FASTZIP: "true"
  TEST_ENV: test
  VITE_API_URL: https://im.deepminer.com.cn
  VITE_API_BASE_URL: /api

.install_packages: &install_packages
  stage: install&build
  image: hub.intra.mlamp.cn/miaozhen-frontend/node:22.16.0-pnpm10.12.1
  tags:
    - nb
  cache:
    # 相对路径 — 老版 gitlab-runner(12.5.0) 对 $CI_PROJECT_DIR/... 的展开不一致,
    # 上一版用绝对路径时 archive_cache 报 "no matching files"。
    - key:
        files:
          - pnpm-lock.yaml
      paths:
        - .pnpm-store/
        - .tsbuildinfo/
  artifacts:
    name: "build_${ENV}_dist"
    expire_in: 30 mins
    paths:
      - $CI_PROJECT_DIR/dist
  before_script:
    # image 自带 pnpm 10.12.1,但 packageManager 锁定 11.2.2,全局装一份匹配
    - npm config set prefix "$CI_PROJECT_DIR/.npm-global"
    - |
      echo -e "\e[0Ksection_start:`date +%s`:install_pnpm[collapsed=true]\r\e[0Knpm install -g pnpm"
      time npm install -g pnpm@11.2.2 --registry=https://registry.npmmirror.com/
      echo -e "\e[0Ksection_end:`date +%s`:install_pnpm\r\e[0K"
    - export PATH="$CI_PROJECT_DIR/.npm-global/bin:$PATH"
    # belt+suspenders: .npmrc 里已有 store-dir,这里再强制一次,并打印实际位置便于排查 cache miss
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
    - echo "[diag] pnpm store path => $(pnpm store path 2>&1)"
    - echo "[diag] .pnpm-store before install => $(du -sh .pnpm-store 2>/dev/null || echo 'EMPTY (cache miss)')"
    # 探一下 runner cache 挂载点 — SRE 配 PVC 后看是否真挂到这里
    - echo "[diag] /cache mount => $(ls -la /cache 2>&1 | head -5 || echo 'NOT MOUNTED')"
    - echo "[diag] cache-related mounts => $(mount | grep -iE 'cache|pvc' || echo 'none')"
  script:
    - |
      echo -e "\e[0Ksection_start:`date +%s`:pnpm_install[collapsed=true]\r\e[0Kpnpm install"
      time pnpm install --frozen-lockfile --prefer-offline
      echo -e "\e[0Ksection_end:`date +%s`:pnpm_install\r\e[0K"
    - echo "[diag] .pnpm-store after install => $(du -sh .pnpm-store 2>/dev/null || echo 'STILL EMPTY — store-dir not honored!')"
    - |
      echo -e "\e[0Ksection_start:`date +%s`:pnpm_build[collapsed=true]\r\e[0Kpnpm build"
      time pnpm build
      echo -e "\e[0Ksection_end:`date +%s`:pnpm_build\r\e[0K"
    - echo "[diag] .tsbuildinfo after build => $(du -sh .tsbuildinfo 2>/dev/null || echo 'EMPTY')"

.dupcheck_base: &dupcheck_base
  stage: quality
  image: hub.intra.mlamp.cn/miaozhen-frontend/node:22.16.0-pnpm10.12.1
  tags:
    - nb
  cache:
    - key:
        files:
          - pnpm-lock.yaml
      paths:
        - .pnpm-store/
  before_script:
    - npm config set prefix "$CI_PROJECT_DIR/.npm-global"
    - |
      echo -e "\e[0Ksection_start:`date +%s`:install_pnpm[collapsed=true]\r\e[0Knpm install -g pnpm"
      time npm install -g pnpm@11.2.2 --registry=https://registry.npmmirror.com/
      echo -e "\e[0Ksection_end:`date +%s`:install_pnpm\r\e[0K"
    - export PATH="$CI_PROJECT_DIR/.npm-global/bin:$PATH"
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - |
      echo -e "\e[0Ksection_start:`date +%s`:pnpm_install[collapsed=true]\r\e[0Kpnpm install"
      time pnpm install --frozen-lockfile --prefer-offline
      echo -e "\e[0Ksection_end:`date +%s`:pnpm_install\r\e[0K"
    - pnpm dupcheck
  artifacts:
    name: "dupcheck_${CI_COMMIT_REF_SLUG}_${CI_PIPELINE_ID}"
    when: always
    expire_in: 14 days
    paths:
      - .jscpd/report.html
      - .jscpd/jscpd-report.json

.package: &package
  stage: package
  image:
    name: hub.intra.mlamp.cn/miaozhen-frontend/docker:18.09.7
  cache: {}
  tags:
    - nb
  script:
    - docker login $REPOSITORY -u 'robot$omi-fe' -p $HARBOR_PWD
    - docker build -t ${PUSH_IMAGE_PATH} --build-arg DEPLOY_ENV="$DEPLOY_ENV" .
    - docker push ${PUSH_IMAGE_PATH}

.deploy: &deploy
  stage: deploy
  image:
    name: hub.intra.mlamp.cn/library/cli:v0.0.3
  dependencies: []
  cache: {}
  tags:
    - nb
  before_script:
    - shopt -s expand_aliases
    - >-
      alias k="kubectl -n $K8S_SPACE_NAME
      --server=\"$K8S_SERVER\"
      --token=\"$K8S_SPACE_TOKEN\" --insecure-skip-tls-verify"
  script:
    - DEPLOYMENT=`cat "./deploy/k8s/$TAG/deployment.yml"`
    - SERVICE=`cat "./deploy/k8s/$TAG/service.yml"`
    - DEPLOYMENT_NAME="$APP_NAME-$TAG-deployment"
    - echo "$DEPLOYMENT" | k apply -f -
    - k set image deployment/$DEPLOYMENT_NAME $APP_NAME-$TAG=$PULL_IMAGE_PATH --record
    - echo "$SERVICE" | k apply -f -

install_packages_test:
  <<: *install_packages
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - when: never
  variables:
    ENV: $TEST_ENV

package_test:
  <<: *package
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - when: never
  dependencies:
    - install_packages_test
  variables:
    PUSH_IMAGE_PATH: $CONTAINER_IMAGE:$TEST_ENV$CI_PIPELINE_ID
    DEPLOY_ENV: "$TEST_ENV"

deploy_test:
  <<: *deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - when: never
  variables:
    TAG: $TEST_ENV
    K8S_SPACE_NAME: mz-frontend
    K8S_SPACE_TOKEN: $CI_K8S_MZ_FRONTEND_TOKEN
    K8S_SERVER: https://k8s.nb.intra.mlamp.cn:8443
    PULL_IMAGE_PATH: $CONTAINER_IMAGE:$TEST_ENV$CI_PIPELINE_ID

dupcheck_report:
  <<: *dupcheck_base
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $PIPELINE_TASK == "dupcheck"'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $PIPELINE_TASK == "dupcheck"'
    - when: never
