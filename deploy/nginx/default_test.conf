server {
    listen       80;
    server_name  localhost;

    client_max_body_size 1000M;
    client_body_buffer_size 500M;

    root /usr/share/nginx/html;

    gzip on;
    gzip_min_length 1k;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 2;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'self';" always;

    proxy_ssl_server_name on;
    proxy_set_header Host im.deepminer.com.cn;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Main IM/API gateway. CI builds VITE_API_BASE_URL=/api, so /api/foo
    # is forwarded to the backend /v1/foo endpoint.
    location /api/ {
        proxy_pass https://im.deepminer.com.cn/v1/;
    }

    # A few legacy/file endpoints still call /v1 directly.
    location /v1/ {
        proxy_pass https://im.deepminer.com.cn/v1/;
    }

    # Matter and summary are separate route prefixes behind the same gateway.
    location /matter/api/v1/ {
        proxy_pass https://im.deepminer.com.cn/matter/api/v1/;
    }

    location /summary/api/v1/ {
        proxy_pass https://im.deepminer.com.cn/summary/api/v1/;
    }

    location / {
        if ($request_filename ~* .*\.(?:htm|html)$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
        if ($request_filename ~* .*\.json$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
